<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【第三者認証】JA Solar 屋外性能実証試験 年間報告書 (TÜV NORD)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- MathJax for Beautiful LaTeX Math Equations -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f1f5f9;
        }
        /* A4 Page Simulation for Premium Document Look */
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        @media (max-width: 220mm) {
            .a4-page {
                width: 100%;
                min-height: auto;
                padding: 15px;
                box-shadow: none;
                margin-bottom: 20px;
            }
            .sidebar {
                display: none;
            }
        }
        /* Printable Styles */
        @media print {
            body {
                background: white;
            }
            .no-print {
                display: none !important;
            }
            .a4-page {
                box-shadow: none;
                margin: 0;
                page-break-after: always;
                width: 210mm;
                height: 297mm;
            }
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="text-slate-800 antialiased flex h-screen overflow-hidden">

    <!-- SIDEBAR NAVIGATION (NO-PRINT) -->
    <aside class="sidebar no-print w-80 bg-slate-900 text-slate-100 flex flex-col h-full border-r border-slate-800 shrink-0 z-20">
        <!-- Logo Header -->
        <div class="p-6 border-b border-slate-800 bg-slate-950">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded bg-teal-500 flex items-center justify-center font-bold text-slate-950 text-lg">T</div>
                <div>
                    <h1 class="font-extrabold text-sm tracking-wider leading-none text-white">TÜV NORD</h1>
                    <span class="text-[10px] text-slate-400">屋外性能検証 年間レポート</span>
                </div>
            </div>
            <div class="mt-4 bg-slate-850 p-2 rounded text-xs text-teal-400 border border-teal-900/30 flex items-center gap-2">
                <i data-lucide="shield-check" class="w-4 h-4 shrink-0"></i>
                <span>第三者評価・投資家向け検証版</span>
            </div>
        </div>

        <!-- Page Index -->
        <div class="flex-1 overflow-y-auto p-4 space-y-1" id="sidebar-nav">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider px-2 mb-2">レポート構成（全22ページ）</p>
            <!-- Generated page buttons will go here -->
        </div>

        <!-- Presenter Support Tools -->
        <div class="p-4 border-t border-slate-800 bg-slate-950 text-xs text-slate-400 space-y-3">
            <div class="flex items-center justify-between">
                <span>表示モード</span>
                <div class="bg-slate-800 p-0.5 rounded flex border border-slate-700">
                    <button id="btn-mode-page" class="px-2 py-1 rounded bg-teal-500 text-slate-950 font-medium transition" onclick="setMode('page')">ページ別</button>
                    <button id="btn-mode-scroll" class="px-2 py-1 rounded text-slate-300 hover:text-white transition" onclick="setMode('scroll')">全ページ</button>
                </div>
            </div>
            <button onclick="window.print()" class="w-full py-2 bg-slate-800 hover:bg-slate-700 text-white rounded font-medium flex items-center justify-center gap-2 transition border border-slate-700">
                <i data-lucide="printer" class="w-4 h-4"></i>
                レポートを印刷 / PDF保存
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT CONTAINER -->
    <main class="flex-1 flex flex-col h-full min-w-0 bg-slate-100 overflow-hidden relative">
        <!-- TOP UTILITY BAR (NO-PRINT) -->
        <header class="no-print h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 z-10 shrink-0">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 text-sm text-slate-500">
                    <span class="font-bold text-slate-800" id="current-page-indicator">Page 1 of 22</span>
                    <span class="text-slate-300">|</span>
                    <span class="text-slate-600 hidden md:inline">JA Solar 屋外性能試験検証報告書</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <!-- Highlight Indicator -->
                <button onclick="toggleHighlightDrawer()" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs bg-amber-50 hover:bg-amber-100 text-amber-850 border border-amber-200 font-semibold transition">
                    <i data-lucide="lightbulb" class="w-4 h-4 text-amber-500 animate-pulse"></i>
                    <span>投資アピール考察ポイントを表示</span>
                </button>
                <!-- Prev/Next Controls -->
                <div class="flex items-center gap-1">
                    <button onclick="prevPage()" class="p-2 rounded-lg hover:bg-slate-100 text-slate-600 transition" title="前のページ">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </button>
                    <button onclick="nextPage()" class="p-2 rounded-lg hover:bg-slate-100 text-slate-600 transition" title="次のページ">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- PORTABLE PRESENTATION NOTES DRAWER -->
        <div id="highlight-drawer" class="no-print hidden bg-gradient-to-r from-amber-50 to-orange-50 border-b border-amber-200 p-5 shadow-inner shrink-0 relative transition-all duration-300">
            <div class="max-w-4xl mx-auto flex gap-4 items-start">
                <div class="p-2.5 bg-amber-500 text-white rounded-lg shadow-md shrink-0">
                    <i data-lucide="trending-up" class="w-5 h-5"></i>
                </div>
                <div class="flex-1">
                    <h3 class="font-bold text-amber-900 text-sm mb-1 flex items-center gap-2">
                        現在のページの投資家向け説明・アピール戦略
                    </h3>
                    <p id="highlight-content" class="text-xs text-amber-800 leading-relaxed font-medium">
                        (エグゼクティブサマリー) 第三者評価レポートとしての高い信頼性を前面に押し出しつつ、TOPCon技術が実際の気象・環境下で確実なアドバンテージを得られることを論理的に説明するための導入部です。
                    </p>
                </div>
                <button onclick="toggleHighlightDrawer()" class="text-amber-400 hover:text-amber-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- REPORT VIEW AREA -->
        <div class="flex-1 overflow-y-auto p-8" id="report-viewport">
            <div class="space-y-12" id="pages-container">
                <!-- Dynamic Pages will be rendered here by JavaScript -->
            </div>
        </div>
    </main>

    <!-- SCRIPT LOGIC -->
    <script>
        // Total Pages in Report
        const TOTAL_PAGES = 22;
        let currentPage = 1;
        let displayMode = 'page'; // 'page' or 'scroll'

        // Highlight notes mapped per actual page index
        const highlightNotes = {
            1: "【信頼性の担保】TÜV NORDという世界的な第三者機関の厳格な検証による、非常に中立性の高いレポートであることを投資家に強調します。これにより、JA Solarの一方的な主張ではないという絶対的安心感を与えます。",
            2: "【国際規格への完全準拠】IEC 61724-1などの厳密な国際太陽光システム基準に沿って試験が行われていることを示します。試験の「規格適合性」は機関投資家のデューデリジェンスにおける必須要件です。",
            3: "【網羅性（MECE）の提示】実証結果をただ並べるのではなく、日射強度別、時間帯別、天候別など細分化した切り口で多角的に検証していることを目次で提示し、データ構造の完璧さをアピールします。",
            4: "【公平な実験環境】実験の前提条件が極めて公正であることをアピール。揚州という実用的なサイト選定、同一傾斜角、DC側での高精度メーターによるリアルタイム測定など、変数が全て制御されていることを示します。",
            5: "【ビジュアルによる客観性】揚州実証サイトのパノラマ写真です。周辺に障害物がなく、同一アレイ上に美しく配列されていることを目で見て確認させ、陰の影響などのノイズがないことを保証します。",
            6: "【実地運用の透明性】架台高や人工芝、黒セメントといった地面アルベド（反射率）の再現性を実際の写真で示します。両面発電（Bifacial）モジュールのポテンシャルを最大に引き出す実環境が整っていることを投資家に示します。",
            7: "【測定精度の保証】各高精度センサーや気象観測機器の型式、および有効期限内の校正証明データを網羅。データの改ざんや機器の誤差を一切排除した完璧なデータ品質であることをアピールします。",
            8: "【初期性能のキャリブレーション】曝露試験前にラボで全モジュールのSTC（基準状態）出力測定を行っており、初期の「実力値」をテーブル化。TOPConとTBCの初期定格出力（Pmax）を厳格に把握した上でのスタートであることを証明します。",
            9: "【コアメッセージ：年間+3.58%のゲイン】投資家が最も見るべき年間総括シートです。TBC（Baseline）を基準とし、TOPConが『年間+3.58%』の標準化発電量を達成したという決定的な事実を、具体的な発電量差（1461.79 kWh/kW vs 1411.32 kWh/kW）と共に示します。",
            10: "【年間安定稼働の証明】12ヶ月分のデータをブレイクダウン。季節（冬の低照度、夏の高温高照度）を問わず、年間を通じて常にTOPConが安定的に『+2.97%から+4.37%』のゲインを出し続けている安定アセットであることを訴求します。",
            11: "【月間データのビジュアル化】月間発電量の推移とゲインを視覚的にアピール。TBC（ブルー）とTOPCon（ライトグリーン）の差が、どの月も継続的に開いている様子を印象的に示します。",
            12: "【最大の差別化：低日射特性】非常に重要なデータです。日射量が100 W/㎡未満の弱光時、TOPConは『+9.18%』という驚異的なゲインを記録。低日射量帯での高効率さが、年間を通じた塵積もりの発電量アップに最も寄与している技術的根拠を提示します。",
            13: "【低日射ゲインのグラフ化】日射強度が下がるにつれて、TOPConの発電ゲイン曲線（オレンジ点線）が右肩上がりに急上昇する様子が視覚的に一目で分かります。曇天や雨の多い地域での投資回収性（ROI）の高さを強くアピールできます。",
            14: "【時間帯別ゲインの優位性】早朝（06:00-07:00：+8.10%）および夕方（17:00-18:00：+8.63%）において圧倒的な差をつけています。1日の中で『最も稼働時間を引き伸ばせる』のがTOPConであるというストーリーが完成します。",
            15: "【時間帯別グラフの提示】朝夕にピークを持つ綺麗なU字型のゲイン曲線を示します。これにより、実質的な発電プラントとしての稼働時間（ウインドウ）がTOPConによって拡大されることが一目瞭然です。",
            16: "【曇天日（低日射・高散乱光）の裏付け】2025年3月27日の典型的な曇天日の日照データ。裏面からの散乱光を効率よく取り込みつつ、全体にわたって高い発電ゲイン（青ライン）が終始『+6%〜+14%』で推移していることを説明します。",
            17: "【晴天日の安定ゲイン】2025年4月2日の晴天データ。日中に日射量が高くなる時間でも、TBCに対して安定して『+2%〜+4%』のゲインを終始維持。両面受光＋優れた温度係数のダブルの効果が実証されています。",
            18: "【システム効率（PR）の極めて高い差】本質的なプラント性能比（PR）において、TOPConは『99.4%』という驚異的な数値を記録（TBCは96.0%）。プラントロスが極限まで少なく、設計時のシミュレーション値を遥かに超える優れたクオリティを証明。",
            19: "【PRの月別ブレイクダウン】1年間の全月におけるPRの比較。TOPConは年間を通してほぼすべての月で95%〜103%の高いPR値をキープ。TBCとの差が年間通して継続している信頼のデータテーブルです。",
            20: "【PR・発電量の複合対比】月間の標準化発電量（棒）とPR（折れ線）を重ねたグラフ。すべての月でTOPConが常に優位にある事実を視覚的・科学的に投資家へ刷り込みます。",
            21: "【総合結論：LCOE低減に直結】TÜV NORDが公式に「TOPConバイフェイシャルがTBCより+3.58%の発電ゲイン」と結論づけています。さらに「異常な劣化や不具合は一切なし」との文言は、長期的なファンド投資のリスクをゼロにする決定的な言葉です。",
            22: "【透明性の完結】最後まで厳格な検証プロセスを明示するため、フラッシュテストに使われた基準ソーラーシミュレータの校正日を表記。投資意思決定に必要なすべての情報をMECE（漏れなく重複なく）網羅した完璧な技術資料の結びです。"
        };

        // Initialize and generate Sidebar & Pages on window load
        window.onload = function() {
            generateSidebar();
            renderAllPages();
            setPage(1);
            // Setup Lucide icons
            lucide.createIcons();
        };

        // Render Sidebar Navigation buttons
        function generateSidebar() {
            const sidebarNav = document.getElementById('sidebar-nav');
            // Titles for pages to make nav highly intuitive
            const pageTitles = {
                1: "表紙 (TÜV NORD 年間報告書)",
                2: "申請者情報 & 評価基準・規格",
                3: "目次 (CATALOGUE)",
                4: "1. 実証プロジェクト概要",
                5: "図1：実証基地のパノラマ写真",
                6: "図2：実証モジュールの設置写真",
                7: "プロジェクト基本情報 & 機器仕様",
                8: "2. 初期電気性能パラメータ",
                9: "3. 年間発電量概要",
                10: "3.2 月間発電量データ表",
                11: "図3：月間標準化発電量グラフ",
                12: "3.3 日射強度別標準化発電量",
                13: "図4：日射強度別発電量グラフ",
                14: "3.4 時間帯別標準化発電量",
                15: "図5：時間帯別発電量グラフ",
                16: "3.5 典型的な天候：曇天日特性",
                17: "3.5 典型的な天候：晴天日特性",
                18: "4. パフォーマンスレシオ (PR)",
                19: "5. グループ性能比較データ表",
                20: "図6：発電量・PR総合比較グラフ",
                21: "6. 総合評価 (結論)",
                22: "別紙1：測定機器リスト"
            };

            for (let i = 1; i <= TOTAL_PAGES; i++) {
                const btn = document.createElement('button');
                btn.id = `side-btn-${i}`;
                btn.className = "w-full text-left px-3 py-2 rounded text-xs transition-all flex items-center gap-2 hover:bg-slate-800 text-slate-400";
                btn.onclick = () => setPage(i);
                btn.innerHTML = `
                    <span class="w-5 h-5 shrink-0 rounded bg-slate-800 text-slate-300 flex items-center justify-center font-semibold text-[10px] border border-slate-700">${i}</span>
                    <span class="truncate font-medium">${pageTitles[i]}</span>
                `;
                sidebarNav.appendChild(btn);
            }
        }

        // Toggle Display Mode
        function setMode(mode) {
            displayMode = mode;
            const btnPage = document.getElementById('btn-mode-page');
            const btnScroll = document.getElementById('btn-mode-scroll');

            if (mode === 'page') {
                btnPage.className = "px-2 py-1 rounded bg-teal-500 text-slate-950 font-medium transition";
                btnScroll.className = "px-2 py-1 rounded text-slate-300 hover:text-white transition";
                // Show only active page
                for (let i = 1; i <= TOTAL_PAGES; i++) {
                    const pageDiv = document.getElementById(`page-wrapper-${i}`);
                    if (i === currentPage) {
                        pageDiv.classList.remove('hidden');
                    } else {
                        pageDiv.classList.add('hidden');
                    }
                }
            } else {
                btnScroll.className = "px-2 py-1 rounded bg-teal-500 text-slate-950 font-medium transition";
                btnPage.className = "px-2 py-1 rounded text-slate-300 hover:text-white transition";
                // Show all pages
                for (let i = 1; i <= TOTAL_PAGES; i++) {
                    const pageDiv = document.getElementById(`page-wrapper-${i}`);
                    pageDiv.classList.remove('hidden');
                }
            }
        }

        // Set Navigation Active Page
        function setPage(pageNum) {
            if (pageNum < 1 || pageNum > TOTAL_PAGES) return;
            currentPage = pageNum;

            // Highlight Active Sidebar Button
            for (let i = 1; i <= TOTAL_PAGES; i++) {
                const btn = document.getElementById(`side-btn-${i}`);
                const numSpan = btn.querySelector('span');
                if (i === pageNum) {
                    btn.classList.add('bg-teal-950', 'text-teal-400', 'border-l-4', 'border-teal-500');
                    btn.classList.remove('hover:bg-slate-800', 'text-slate-400');
                } else {
                    btn.classList.remove('bg-teal-950', 'text-teal-400', 'border-l-4', 'border-teal-500');
                    btn.classList.add('hover:bg-slate-800', 'text-slate-400');
                }
            }

            // Set UI indicators
            document.getElementById('current-page-indicator').innerText = `Page ${pageNum} of ${TOTAL_PAGES}`;
            document.getElementById('highlight-content').innerText = highlightNotes[pageNum];

            // Handle Page visibility based on displayMode
            if (displayMode === 'page') {
                setMode('page');
            } else {
                // Scroll to specific page in scroll mode
                const pageElement = document.getElementById(`page-wrapper-${pageNum}`);
                if (pageElement) {
                    pageElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }
        }

        function prevPage() {
            if (currentPage > 1) setPage(currentPage - 1);
        }

        function nextPage() {
            if (currentPage < TOTAL_PAGES) setPage(currentPage + 1);
        }

        // Toggle Portable Support Highlight Drawer
        function toggleHighlightDrawer() {
            const drawer = document.getElementById('highlight-drawer');
            drawer.classList.toggle('hidden');
        }

        // Render LaTeX formulas after dynamic content load
        function triggerMathJax() {
            if (window.MathJax) {
                MathJax.typeset();
            }
        }

        // Core Renderer for the 22 pages
        function renderAllPages() {
            const container = document.getElementById('pages-container');
            container.innerHTML = ''; // Clear

            for (let i = 1; i <= TOTAL_PAGES; i++) {
                const pageWrapper = document.createElement('div');
                pageWrapper.id = `page-wrapper-${i}`;
                pageWrapper.className = "page-wrapper relative";

                // Generate exact inner page HTML contents
                pageWrapper.innerHTML = generatePageHTML(i);
                container.appendChild(pageWrapper);

                // Build Charts where needed
                buildPageChart(i);
            }
            triggerMathJax();
        }

        // Helper function for building specific chart for specific page
        function buildPageChart(pageNum) {
            // Wait for DOM
            setTimeout(() => {
                if (pageNum === 11) {
                    // P11 Monthly Normalized Energy Yield
                    const ctx = document.getElementById('chart-p11').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['2024-12', '2025-01', '2025-02', '2025-03', '2025-04', '2025-05', '2025-06', '2025-07', '2025-08', '2025-09', '2025-10', '2025-11', '2025-12'],
                            datasets: [
                                {
                                    label: 'TBC (kWh/kW)',
                                    data: [75.25, 116.47, 106.28, 131.16, 154.23, 138.66, 25.02, 139.07, 157.21, 95.11, 93.78, 121.03, 58.05],
                                    backgroundColor: '#2563eb', // Royal Blue
                                    borderRadius: 4
                                },
                                {
                                    label: 'TOPCon (kWh/kW)',
                                    data: [77.80, 120.68, 110.33, 135.74, 159.57, 143.41, 26.11, 143.41, 161.88, 99.06, 97.68, 125.80, 60.32],
                                    backgroundColor: '#10b981', // Emerald Green
                                    borderRadius: 4
                                },
                                {
                                    label: 'TOPCon 発電ゲイン (%)',
                                    data: [3.39, 3.62, 3.81, 3.49, 3.46, 3.42, 4.37, 3.12, 2.97, 4.15, 4.16, 3.94, 3.91],
                                    type: 'line',
                                    borderColor: '#f97316', // Orange
                                    borderWidth: 2,
                                    pointBackgroundColor: '#f97316',
